apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: reportportal-ingress
  namespace: oliviahub
spec:
  ingressClassName: nginx
  rules:
  - host: reportportal.k8.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: rppt-reportportal-ui
            port:
              number: 8080

